# Generation configuration for the TRIZ-on vs TRIZ-off study.
# All calls go through the Vercel AI Gateway (OpenAI-compatible endpoint).
# Set your key in the environment:  export AI_GATEWAY_API_KEY=...
# Discover valid model ids with:    python src/generate.py --list-models

gateway_base_url: https://openrouter.ai/api/v1

# Experiment isolation. Each run writes to its OWN folders so experiments never collide:
#   data/<run>/generations, data/<run>/judgements, results/<run>/, pairs_<run>.json
# Point `casebase` at the case file for this run.
# p40 review run: 43 conditions x 5 cases x 4 models, generation ONLY
# (no build_pairs / judging - outputs go to manual review, then the game's rate tab)
run: p40_review
casebase: casebase_p5.json
prompt_dir: p40
conditions: [T_OFF, T_ON, T_ON_ALL40,
  T_ON_P01, T_ON_P02, T_ON_P03, T_ON_P04, T_ON_P05, T_ON_P06, T_ON_P07, T_ON_P08,
  T_ON_P09, T_ON_P10, T_ON_P11, T_ON_P12, T_ON_P13, T_ON_P14, T_ON_P15, T_ON_P16,
  T_ON_P17, T_ON_P18, T_ON_P19, T_ON_P20, T_ON_P21, T_ON_P22, T_ON_P23, T_ON_P24,
  T_ON_P25, T_ON_P26, T_ON_P27, T_ON_P28, T_ON_P29, T_ON_P30, T_ON_P31, T_ON_P32,
  T_ON_P33, T_ON_P34, T_ON_P35, T_ON_P36, T_ON_P37, T_ON_P38, T_ON_P39, T_ON_P40]

# previous run (restore to re-run judging on the patent set):
# run: us_patents
# casebase: casebase_uspatents.json

# Models = the "different agents". Each runs BOTH modes on every problem.
# Edit freely; ids must be valid gateway "creator/model" strings (see --list-models).
models:
  - openai/gpt-4o                # GPT-4 class
  - anthropic/claude-sonnet-4.5  # Claude, same tier
  - deepseek/deepseek-chat-v3.1  # OpenRouter id for DeepSeek V3.1 (Vercel used deepseek/deepseek-v3.1)
  - google/gemini-2.5-flash      # 4th family — tier-matched to gpt-4o, less thinking-budget burn

modes:
  - triz      # TRIZ-expert system prompt
  - control   # no system prompt

# --- Generalized N-condition design (e.g. the 2x2 factorial redesign) -------
# Set `run:` + `casebase:` + the block below instead of `modes:` to run more
# than 2 named conditions. One system-prompt file per condition lives at
# prompts/<prompt_dir>/<condition>.txt (see prompts/factorial/*.txt).
# `prompt_dir` defaults to `run` if omitted, but set it explicitly whenever the
# run name differs from the prompt set (e.g. a case-subset pilot run reusing
# the same "factorial" prompts). generate.py picks this path up automatically
# whenever `conditions:` is present.
#
# run: factorial
# casebase: casebase.json
# prompt_dir: factorial
# conditions:
#   - P_L_TRIZ_ON    # long TRIZ-expert prompt (prompts/factorial/P_L_TRIZ_ON.txt)
#   - P_L_TRIZ_OFF   # length/structure-matched generic design prompt, no TRIZ terms
#   - P_S_TRIZ_ON    # short: "Use TRIZ to solve the following engineering problem."
#   - P_S_TRIZ_OFF   # short: "Solve the following engineering problem."

# Sampling
k: 1                 # us_patents run: 1 sample/cell to keep judging cost ~= main run
temperature: 0.0     # k=1 -> deterministic, reproducible baseline (no need for >0)
max_tokens: 4000     # headroom for thinking models (Gemini 2.5 burns budget on hidden reasoning; 1200 truncated it to a ~35-word stub)

# Limit number of cases (null = all). Casebase currently has 10.
limit: null
